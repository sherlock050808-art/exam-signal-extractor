> 版本：v3.0
> 说明：Knowledge Node 是查询入口 + 意图标签载体，不是内容容器。
> 正文内容在生成时根据 ppt_source / textbook_source / syllabus_source 去原始资料中定位。

---

# Knowledge Node Schema v3.0 模板

```yaml
---
# ═══════════════════════════════════════════════════
# 考试内容定位部分（从 PPT/教材/大纲直接提取）
# ═══════════════════════════════════════════════════

# 节点唯一标识，建议用英文缩写或小写拼音
id: cnc_closed_loop

# 节点名称，直接使用 PPT/教材/大纲的原始标题
name: 闭环控制

# 章节位置
chapter: 1
section: 1.4

# 一句话摘要，用于快速识别和名解答
summary: 直接检测工作台实际位置并反馈，精度高但系统复杂。

# 关键词，用于索引和标签
keywords:
  - 闭环
  - 反馈
  - 精度

# PPT 来源定位
ppt_source: 第1章 -绪论.pdf p.33

# 教材来源定位（可选）
textbook_source: 教材第X章第X节

# 考点大纲来源定位（可选）
syllabus_source: 考点大纲 三、数控机床的控制方式

# 关联节点，用于融合题和知识网络
related_nodes:
  - cnc_open_loop
  - cnc_semi_closed_loop

# ═══════════════════════════════════════════════════
# 考试意图标签部分（从录音/大纲/真题映射而来）
# ═══════════════════════════════════════════════════

# 七层分类之一：
# 必考层 / 高概率层 / 可能层 / 排除层 / 待确认
# 以及特殊层：陷阱区 / 融合区（通常在 traps/fusions 字段体现）
exam_layer: 必考层

# 可能题型
question_types:
  - 名解
  - 简答
  - 分析

# 老师强调原话，用于课堂信号框
teacher_signal: 开环、闭环、半闭环是非常重要的考点，往年都出现过。

# 录音来源，可有多条
recording:
  - timestamp: "10:15"
    note: 开环、闭环、半闭环是非常重要的考点
  - timestamp: "32:40"
    note: 闭环控制精度最高但系统复杂

# 是否往年考过
past_exam: true

# ═══════════════════════════════════════════════════
# 特殊标记部分
# ═══════════════════════════════════════════════════

# 陷阱区：常见错误 + 区分方式
traps:
  - trap: 容易与半闭环混淆
    clarification: 半闭环检测电机轴或丝杠，闭环检测工作台实际位置

# 融合区：与其他节点组合成综合题
fusions:
  - with:
      - cnc_open_loop
      - cnc_semi_closed_loop
    question_form: 比较开环、半闭环、闭环三种控制方式的原理、特点和应用场合

# ═══════════════════════════════════════════════════
# 注意
# ═══════════════════════════════════════════════════
# 本节点不存储完整正文内容。
# 生成资料时，根据 ppt_source / textbook_source 去原始资料中定位原文，
# 再结合 exam_layer 和 question_types 编写答案。
---
```

---

# 字段说明

| 字段 | 必填 | 来源 | 用途 |
|------|------|------|------|
| `id` | 是 | 自动生成 | 节点唯一标识，内部引用 |
| `name` | 是 | PPT/教材/大纲标题 | 输出标题 |
| `chapter` | 是 | PPT/教材结构 | 章节归类 |
| `section` | 是 | PPT/教材结构 | 小节归类 |
| `summary` | 是 | 原文一句话概括 | 名解、快速识别 |
| `keywords` | 是 | 从原文提取 | 索引、标签 |
| `ppt_source` | 是 | PPT 页码 | 定位原文 |
| `textbook_source` | 否 | 教材章节 | 定位原文 |
| `syllabus_source` | 否 | 大纲条目 | 定位原文 |
| `related_nodes` | 否 | 语义关联 | 融合题、知识网络 |
| `exam_layer` | 是 | 录音/大纲/真题 | 决定内容详略 |
| `question_types` | 是 | 录音/大纲/真题 | 题型分布、速查 |
| `teacher_signal` | 否 | 老师原话 | 课堂信号框 |
| `recording` | 否 | 录音时间戳 | 课堂信号框补充 |
| `past_exam` | 否 | 往年真题 | 重点标记 |
| `traps` | 否 | 老师提醒/往年错误 | 易错框 |
| `fusions` | 否 | 老师提醒/综合题模式 | 融合区框 |
